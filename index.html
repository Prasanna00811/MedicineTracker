<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicine Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">

        <div class="login-box">

            <h1>💊 Medicine Tracker</h1>

            <p class="subtitle">
                Manage your medications efficiently
            </p>

            <input
                type="text"
                id="username"
                placeholder="Username">

            <input
                type="password"
                id="password"
                placeholder="Password">

            <div class="btn-group">

                <button
                    class="register-btn"
                    onclick="register()">
                    Register
                </button>

                <button
                    class="login-btn"
                    onclick="login()">
                    Login
                </button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
